<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Advanced CSS Image Styling</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Advanced CSS Image Styling</h1>

    <p class="intro">
      Explore responsive images, filters, shadows,
      object-fit, hover effects, and creative image styling.
    </p>
  </header>

  <!-- BASIC IMAGE -->
  <section class="card">
    <h2>Responsive Image Basics</h2>

    <img
      src="https://picsum.photos/id/1015/800/500"
      alt="Mountain landscape"
      class="responsive-image"
    >
  </section>

  <!-- BORDERS + RADIUS -->
  <section class="card">
    <h2>Borders & Rounded Corners</h2>

    <div class="image-row">

      <img
        src="https://picsum.photos/id/1027/300/300"
        alt="Portrait example"
        class="rounded-image"
      >

      <img
        src="https://picsum.photos/id/1005/300/300"
        alt="Circular profile image"
        class="circle-image"
      >

    </div>
  </section>

  <!-- SHADOWS -->
  <section class="card">
    <h2>Drop Shadows</h2>

    <img
      src="https://picsum.photos/id/1040/500/300"
      alt="Shadow example"
      class="shadow-image"
    >
  </section>

  <!-- FILTERS -->
  <section class="card">
    <h2>Image Filters</h2>

    <div class="image-row">

      <img
        src="https://picsum.photos/id/1060/300/200"
        alt="Grayscale filter"
        class="grayscale"
      >

      <img
        src="https://picsum.photos/id/1060/300/200"
        alt="Sepia filter"
        class="sepia"
      >

      <img
        src="https://picsum.photos/id/1060/300/200"
        alt="Blur filter"
        class="blur"
      >

    </div>
  </section>

  <!-- OBJECT FIT -->
  <section class="card">
    <h2>Object Fit</h2>

    <div class="gallery">

      <img
        src="https://picsum.photos/id/1039/600/400"
        alt="Gallery image"
        class="cover"
      >

      <img
        src="https://picsum.photos/id/1035/600/400"
        alt="Gallery image"
        class="contain"
      >

    </div>
  </section>

  <!-- HOVER EFFECTS -->
  <section class="card">
    <h2>Hover & Transition Effects</h2>

    <img
      src="https://picsum.photos/id/1050/500/300"
      alt="Hover effect example"
      class="hover-image"
    >
  </section>

  <!-- CREATIVE SHAPES -->
  <section class="card">
    <h2>Creative Shapes</h2>

    <div class="image-row">

      <img
        src="https://picsum.photos/id/1025/300/300"
        alt="Circle crop"
        class="circle-shape"
      >

      <img
        src="https://picsum.photos/id/1025/300/300"
        alt="Hexagon crop"
        class="hex-shape"
      >

    </div>
  </section>

  <!-- FIGURE + CAPTION -->
  <section class="card">
    <h2>Figure & Figcaption</h2>

    <figure>
      <img
        src="https://picsum.photos/id/1074/700/400"
        alt="Ceramic installation artwork"
      >

      <figcaption>
        Ceramic installation artwork, 2025
      </figcaption>
    </figure>
  </section>

</body>
</html>
